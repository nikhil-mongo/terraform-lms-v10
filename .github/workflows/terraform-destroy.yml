name: "Terraform — Destroy"

on:
  workflow_dispatch: # manual trigger only — never runs automatically
    inputs:
      environment:
        description: "Type the environment name to confirm destruction (dev / staging / prod)"
        required: true
        type: string
      confirm:
        description: "Type DESTROY to confirm — this is irreversible"
        required: true
        type: string

env:
  TF_VERSION: "1.7.5"

jobs:
  # ── GUARD: validate the confirmation inputs before doing anything ────
  guard:
    name: "Guard Check"
    runs-on: ubuntu-latest
    steps:
      - name: Verify confirmation string
        run: |
          if [ "${{ github.event.inputs.confirm }}" != "DESTROY" ]; then
            echo "❌ Confirmation failed — you must type DESTROY exactly."
            exit 1
          fi
          echo "✅ Confirmation accepted."

      - name: Verify environment name
        run: |
          INPUT="${{ github.event.inputs.environment }}"
          if [[ "$INPUT" != "dev" && "$INPUT" != "staging" && "$INPUT" != "prod" ]]; then
            echo "❌ Unknown environment: $INPUT — must be dev, staging, or prod."
            exit 1
          fi
          echo "✅ Environment: $INPUT"

  # ── PLAN the destroy (shows what will be deleted) ────────────────────
  plan-destroy:
    name: "Plan Destroy"
    runs-on: ubuntu-latest
    needs: [guard]
    defaults:
      run:
        working-directory: terraform/environments/${{ github.event.inputs.environment }}
    env:
      AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
      AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
      AWS_SESSION_TOKEN: ${{ secrets.AWS_SESSION_TOKEN }}
    steps:
      - uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: Terraform Init
        run: terraform init

      - name: Terraform Plan Destroy
        run: |
          terraform plan -destroy -no-color
          echo ""
          echo "⚠️  Review the above — these resources WILL BE PERMANENTLY DELETED."
          echo "⚠️  Environment: ${{ github.event.inputs.environment }}"
          echo "⚠️  Triggered by: ${{ github.actor }}"

  # ── DESTROY: requires human approval, runs after plan is reviewed ────
  destroy:
    name: "Destroy"
    runs-on: ubuntu-latest
    needs: [plan-destroy]
    defaults:
      run:
        working-directory: terraform/environments/${{ github.event.inputs.environment }}
    # Separate environment per target — each has its own reviewer list
    environment:
      name: destroy-${{ github.event.inputs.environment }}
    env:
      AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
      AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
      AWS_SESSION_TOKEN: ${{ secrets.AWS_SESSION_TOKEN }}
    steps:
      - uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: Terraform Init
        run: terraform init

      - name: Remove prevent_destroy before destroying
        run: |
          # prevent_destroy = true blocks terraform destroy
          # Temporarily comment it out so destroy can proceed
          find . -name "*.tf" -exec sed -i 's/prevent_destroy = true/prevent_destroy = false/g' {} \;
          echo "✅ prevent_destroy overridden for destroy run"

      - name: Terraform Destroy
        run: terraform destroy -auto-approve

      - name: Summary
        run: |
          echo "✅ Destroy complete"
          echo "Environment : ${{ github.event.inputs.environment }}"
          echo "Triggered by: ${{ github.actor }}"
          echo "Timestamp   : $(date -u)"
